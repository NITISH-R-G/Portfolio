  <!-- Profile circle -->
  <circle cx="180" cy="200" r="48" fill="#111111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="180" y="208" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#f0f0f0" text-anchor="middle">NR</text>

  <!-- Name -->
  <text x="260" y="195" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="600" fill="#f0f0f0">Nitish R.G.</text>

  <!-- Role -->
  <text x="260" y="235" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#999999">Software Engineering Student at IIT Madras</text>

  <!-- Divider -->
