    <rect x="0" y="0" width="120" height="32" rx="16" fill="#111111" stroke="#1a1a1a" stroke-width="1"/>
    <text x="60" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#999999" text-anchor="middle">Python</text>

    <rect x="136" y="0" width="140" height="32" rx="16" fill="#111111" stroke="#1a1a1a" stroke-width="1"/>
    <text x="206" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#999999" text-anchor="middle">Machine Learning</text>

    <rect x="292" y="0" width="130" height="32" rx="16" fill="#111111" stroke="#1a1a1a" stroke-width="1"/>
    <text x="357" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#999999" text-anchor="middle">Full-Stack Dev</text>

    <rect x="438" y="0" width="100" height="32" rx="16" fill="#111111" stroke="#1a1a1a" stroke-width="1"/>
    <text x="488" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#999999" text-anchor="middle">React + Vite</text>

    <rect x="554" y="0" width="100" height="32" rx="16" fill="#111111" stroke="#1a1a1a" stroke-width="1"/>
    <text x="604" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#999999" text-anchor="middle">TypeScript</text>

    <rect x="670" y="0" width="90" height="32" rx="16" fill="#111111" stroke="#1a1a1a" stroke-width="1"/>
    <text x="715" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#999999" text-anchor="middle">AWS</text>
  </g>

  <!-- Stats row -->
  <g transform="translate(120, 370)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#555555" letter-spacing="0.1em">RANKED #73 GLOBALLY · HACKERRANK 5-STAR GOLD · IIT MADRAS</text>
  </g>

  <!-- Bottom bar -->
  <line x1="120" y1="420" x2="1080" y2="420" stroke="#1a1a1a" stroke-width="1"/>

  <!-- URL -->
  <text x="120" y="460" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#555555">nitish-r-g.github.io/Portfolio</text>

